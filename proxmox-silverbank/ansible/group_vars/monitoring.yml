# group_vars/monitoring.yml
app_image: "ghcr.io/mariusiordan/silverbank"
app_tag:   "staging"
app_dir:   /opt/app
app_port_frontend: 3000
app_port_backend:  4000

# Staging uses local PostgreSQL container - completely isolated from production
db_host:     "db"           # local container, NOT production DB
db_port:     5432
db_name:     "appdb"
db_user:     "{{ vault_db_user }}"
db_password: "{{ vault_db_password }}"