---
# playbooks/deploy-production.yml
# Full Blue/Green production deployment with auto-detection and smoke tests
# Triggered by deploy.yml GitHub Actions workflow AFTER manual approval
#
# Usage:
#   ansible-playbook playbooks/deploy-production.yml -e "app_tag=sha-abc123"
#
# Flow:
#   1. Read /opt/current-env on edge nginx to find which env is active
#   2. Calculate which env is idle (the opposite of active)
#   3. Deploy frontend + backend to idle environment using docker-compose.prod.yml
#   4. Run smoke tests directly on idle VM (traffic still on active env)
#   5. If smoke tests pass → switch nginx traffic to new environment
#   6. If smoke tests fail → stop, active env keeps serving traffic

# ============================================================
# PLAY 1 - Detect active environment
# ============================================================
- name: Detect active environment
  hosts: edge-nginx
  become: true
  tasks:

    - name: Read current active environment
      command: cat /opt/current-env
      register: current_env
      failed_when: false

    - name: Set idle environment
      set_fact:
        active_env: "{{ current_env.stdout | default('green') | trim }}"
        idle_env: "{{ 'blue' if (current_env.stdout | default('green') | trim) == 'green' else 'green' }}"

    - name: Show environments
      debug:
        msg: "Active: {{ active_env }} | Deploying to: {{ idle_env }}"

# ============================================================
# PLAY 2 - Deploy frontend + backend to idle environment
# ============================================================
- name: Deploy to idle environment
  hosts: "{{ 'prod-vm1-BLUE' if hostvars['edge-nginx']['idle_env'] == 'blue' else 'prod-vm2-GREEN' }}"
  become: true
  vars:
    app_dir: /opt/app
    app_tag: "{{ app_tag | default('latest') }}"

  tasks:

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"

    - name: Deploy .env file
      template:
        src: ../roles/app/templates/.env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"
        mode: "0600"

    - name: Copy docker-compose.prod.yml
      copy:
        src: ../files/docker-compose.prod.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"

    - name: Login to GitHub Container Registry
      become_user: "{{ docker_user }}"
      command: docker login ghcr.io -u mariusiordan --password-stdin
      args:
        stdin: "{{ vault_ghcr_token }}"

    - name: Pull new images
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose pull
        chdir: "{{ app_dir }}"
      environment:
        APP_TAG: "{{ app_tag }}"
        DB_USER: "{{ vault_db_user }}"
        DB_PASSWORD: "{{ vault_db_password }}"
        DB_HOST: "{{ db_host }}"
        DB_NAME: "{{ db_name }}"
        JWT_SECRET: "{{ vault_jwt_secret }}"

    - name: Stop existing containers
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose down --remove-orphans
        chdir: "{{ app_dir }}"
      ignore_errors: true

    - name: Start frontend + backend containers
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      environment:
        APP_TAG: "{{ app_tag }}"
        DB_USER: "{{ vault_db_user }}"
        DB_PASSWORD: "{{ vault_db_password }}"
        DB_HOST: "{{ db_host }}"
        DB_NAME: "{{ db_name }}"
        JWT_SECRET: "{{ vault_jwt_secret }}"

    - name: Wait for backend to be ready
      wait_for:
        host: "{{ ansible_host }}"
        port: 4000
        delay: 10
        timeout: 90

    - name: Wait for frontend to be ready
      wait_for:
        host: "{{ ansible_host }}"
        port: 3000
        delay: 5
        timeout: 60

# ============================================================
# PLAY 3 - Smoke tests on idle environment (bypass nginx)
# ============================================================
- name: Smoke tests on idle environment
  hosts: edge-nginx
  become: true
  tasks:

    - name: Set idle IP
      set_fact:
        idle_ip: "{{ blue_app_ip if hostvars['edge-nginx']['idle_env'] == 'blue' else green_app_ip }}"

    - name: Smoke test - backend health check
      uri:
        url: "http://{{ idle_ip }}:4000/api/health"
        status_code: 200
      register: smoke
      retries: 5
      delay: 10

    - name: Smoke test passed
      debug:
        msg: "✅ Smoke test passed on {{ hostvars['edge-nginx']['idle_env'] }} - DB: {{ smoke.json.database }}"

# ============================================================
# PLAY 4 - Switch nginx traffic to new environment
# ============================================================
- name: Switch nginx traffic
  hosts: edge-nginx
  become: true
  tasks:

    - name: Switch traffic to idle environment
      command: "/opt/switch-backend.sh {{ hostvars['edge-nginx']['idle_env'] }}"

    - name: Confirm switch
      debug:
        msg: "✅ Traffic switched to {{ hostvars['edge-nginx']['idle_env'] }}"

# ============================================================
# PLAY 5 - Monitor 10 minutes + promote to :latest if stable
# ============================================================
- name: Monitor and auto rollback if needed
  hosts: edge-nginx
  become: true
  vars:
    monitor_duration: 600
    check_interval: 30
    max_failures: 3
    new_env: "{{ hostvars['edge-nginx']['idle_env'] }}"
    previous_env: "{{ hostvars['edge-nginx']['active_env'] }}"

  tasks:
    - name: Monitor new environment for 10 minutes
      block:
        - name: Run health checks for {{ monitor_duration }}s
          shell: |
            failures=0
            elapsed=0

            while [ $elapsed -lt {{ monitor_duration }} ]; do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "✅ [$elapsed s] Health check passed"
                failures=0
              else
                failures=$((failures + 1))
                echo "❌ [$elapsed s] Health check failed (failure $failures/{{ max_failures }})"
                if [ $failures -ge {{ max_failures }} ]; then
                  echo "ROLLBACK_NEEDED"
                  exit 1
                fi
              fi

              sleep {{ check_interval }}
              elapsed=$((elapsed + {{ check_interval }}))
            done

            echo "✅ Monitoring complete - stable"
          register: monitor_result

        - name: "✅ Stable - promoting {{ app_tag }} to latest"
          become_user: "{{ docker_user }}"
          shell: |
            echo "{{ vault_ghcr_token }}" | docker login ghcr.io -u mariusiordan --password-stdin

            docker buildx imagetools create \
              -t ghcr.io/mariusiordan/silverbank-frontend:latest \
              ghcr.io/mariusiordan/silverbank-frontend:{{ app_tag }}

            docker buildx imagetools create \
              -t ghcr.io/mariusiordan/silverbank-backend:latest \
              ghcr.io/mariusiordan/silverbank-backend:{{ app_tag }}

            echo "✅ Promoted {{ app_tag }} to :latest - AWS DR ready"
          when: app_tag is defined

      rescue:
        - name: "❌ Rolling back to {{ previous_env }}"
          command: "/opt/switch-backend.sh {{ previous_env }}"

        - name: Confirm rollback
          debug:
            msg: "🔄 Rolled back to {{ previous_env }} - :latest NOT updated"

        - name: Fail the pipeline
          fail:
            msg: "Deployment failed - rolled back - :latest remains previous stable version"
