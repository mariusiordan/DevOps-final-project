---
# playbooks/deploy-staging.yml
# Deploy a new version to Staging VM for integration testing
#
# Usage:
#   ansible-playbook playbooks/deploy-staging.yml -e "app_tag=sha-abc123"
#
# Flow:
#   1. Deploy new image to stage-monitoring VM
#   2. Health check to verify app is running

- name: Deploy app to Staging
  hosts: monitoring
  become: true
  roles:
    - app

- name: Verify staging deployment
  hosts: monitoring
  become: true
  tasks:
    - name: Wait for app to start
      wait_for:
        port: 3000
        delay: 10
        timeout: 60

    - name: Health check
      uri:
        url: "http://{{ ansible_host }}:3000/api/health"
        status_code: 200
      register: health
      retries: 3
      delay: 5

    - name: Show health result
      debug:
        msg: "✅ Staging is healthy: {{ health.json.status }}"