---
# playbooks/deploy-staging.yml
# Deploy frontend + backend + db to staging VM using docker-compose.staging.yml
# Triggered by staging.yml GitHub Actions workflow
#
# Usage:
#   ansible-playbook playbooks/deploy-staging.yml -e "app_tag=sha-abc123"
#
# Flow:
#   1. Login to ghcr.io on staging VM
#   2. Copy docker-compose.staging.yml to staging VM
#   3. Write .env file with secrets
#   4. Pull all images first (before starting containers)
#   5. Start all 3 containers (frontend, backend, db)
#   6. Wait for DB to be ready (heaviest container)
#   7. Wait for backend to be ready
#   8. Wait for frontend to be ready
#   9. Health check

- name: Deploy 3-tier app to Staging
  hosts: monitoring
  become: true
  vars:
    app_dir: /opt/app
    app_tag: "{{ app_tag | default('staging') }}"

  tasks:

    - name: Create app directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"

    - name: Deploy .env file
      template:
        src: ../roles/app/templates/.env.j2
        dest: "{{ app_dir }}/.env"
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"
        mode: "0600"

    - name: Copy docker-compose.staging.yml
      copy:
        src: ../files/docker-compose.staging.yml
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"

    - name: Login to GitHub Container Registry
      become_user: "{{ docker_user }}"
      command: docker login ghcr.io -u mariusiordan --password-stdin
      args:
        stdin: "{{ vault_ghcr_token }}"

    # Pull images first - before starting anything
    # This avoids timeout issues when containers start
    - name: Pull all Docker images
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose pull
        chdir: "{{ app_dir }}"
      environment:
        APP_TAG: "{{ app_tag }}"
        DB_USER: "{{ vault_db_user }}"
        DB_PASSWORD: "{{ vault_db_password }}"
        JWT_SECRET: "{{ vault_jwt_secret }}"

    # Stop existing containers before starting new ones
    - name: Stop existing containers
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose down
        chdir: "{{ app_dir }}"
      ignore_errors: true

    # Start all containers
    - name: Start all containers
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose up -d
        chdir: "{{ app_dir }}"
      environment:
        APP_TAG: "{{ app_tag }}"
        DB_USER: "{{ vault_db_user }}"
        DB_PASSWORD: "{{ vault_db_password }}"
        JWT_SECRET: "{{ vault_jwt_secret }}"

    # Wait for DB container to be healthy (postgres takes longest to init)
    # Check DB is healthy via docker
    - name: Wait for DB container to be healthy
      become_user: "{{ docker_user }}"
      command:
        cmd: docker exec silverbank-db pg_isready -U appuser
        chdir: "{{ app_dir }}"
      register: db_ready
      retries: 10
      delay: 5
      until: db_ready.rc == 0

    # Wait for backend Express server
    - name: Wait for backend to be ready
      wait_for:
        host: "{{ ansible_host }}"
        port: 4000
        delay: 5
        timeout: 60

    # Wait for frontend Next.js server
    - name: Wait for frontend to be ready
      wait_for:
        host: "{{ ansible_host }}"
        port: 3000
        delay: 5
        timeout: 60

    # Health check on backend - verifies DB is connected
    - name: Health check on backend
      uri:
        url: "http://{{ ansible_host }}:4000/api/health"
        status_code: 200
      register: health
      retries: 5
      delay: 10

    - name: Show health result
      debug:
        msg: "✅ Staging is healthy: {{ health.json.status }} | DB: {{ health.json.database }}"
    