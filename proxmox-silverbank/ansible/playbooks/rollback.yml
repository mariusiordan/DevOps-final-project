---
# playbooks/rollback.yml
# Monitor the new environment for 10 minutes after traffic switch
# If health checks fail 3 times in a row → automatically switch nginx back
# If 10 minutes pass successfully → promote image to :latest (used by AWS DR)
#
# Usage (called automatically from deploy-production.yml):
#   ansible-playbook playbooks/rollback.yml -e "new_env=green previous_env=blue app_tag=v1.0-prod-2026-03-19-sha-abc123"
#
# Flow:
#   Every 30 seconds for 10 minutes:
#     - Check /api/health on nginx (which now points to new environment)
#     - If healthy → reset failure counter, keep monitoring
#     - If unhealthy → increment failure counter
#     - If 3 consecutive failures → switch nginx back to previous env → fail pipeline
#   After 10 minutes stable → promote app_tag to :latest on ghcr.io

- name: Monitor and auto rollback if needed
  hosts: edge-nginx
  become: true
  vars:
    monitor_duration: 600  # 10 minutes
    check_interval: 30     # check every 30 seconds
    max_failures: 3        # consecutive failures before rollback

  tasks:
    - name: Monitor new environment for 10 minutes
      block:
        - name: Run health checks for {{ monitor_duration }}s
          shell: |
            failures=0
            elapsed=0

            while [ $elapsed -lt {{ monitor_duration }} ]; do
              if curl -sf http://localhost/api/health > /dev/null 2>&1; then
                echo "✅ [$elapsed s] Health check passed"
                failures=0
              else
                failures=$((failures + 1))
                echo "❌ [$elapsed s] Health check failed (failure $failures/{{ max_failures }})"

                if [ $failures -ge {{ max_failures }} ]; then
                  echo "ROLLBACK_NEEDED"
                  exit 1
                fi
              fi

              sleep {{ check_interval }}
              elapsed=$((elapsed + {{ check_interval }}))
            done

            echo "✅ Monitoring complete - {{ new_env }} is stable"
          register: monitor_result

        # ============================================================
        # 10 minutes passed without failures → promote to :latest
        # This means AWS DR will use this confirmed stable version
        # ============================================================
        - name: "✅ Deployment stable - promoting {{ app_tag }} to latest"
          become_user: "{{ docker_user }}"
          shell: |
            echo "{{ vault_ghcr_token }}" | docker login ghcr.io -u mariusiordan --password-stdin

            docker buildx imagetools create \
              -t ghcr.io/mariusiordan/silverbank-frontend:latest \
              ghcr.io/mariusiordan/silverbank-frontend:{{ app_tag }}

            docker buildx imagetools create \
              -t ghcr.io/mariusiordan/silverbank-backend:latest \
              ghcr.io/mariusiordan/silverbank-backend:{{ app_tag }}

            echo "✅ Promoted {{ app_tag }} to :latest - AWS DR ready"
          when: app_tag is defined

      rescue:
        - name: "❌ Health checks failed - rolling back to {{ previous_env }}"
          command: "/opt/switch-backend.sh {{ previous_env }}"

        - name: Confirm rollback
          debug:
            msg: "🔄 Rolled back to {{ previous_env }} after {{ max_failures }} consecutive failures. :latest NOT updated."

        - name: Fail the pipeline
          fail:
            msg: "Deployment failed - rolled back to {{ previous_env }} - :latest remains previous stable version"
