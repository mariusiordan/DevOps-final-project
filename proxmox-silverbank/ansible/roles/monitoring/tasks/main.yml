---
- name: Allow Grafana from LAN only
  ufw:
    rule: allow
    port: "3001"  # changed from 3000
    proto: tcp
    src: "192.168.7.0/24"

- name: Allow Prometheus from LAN only
  ufw:
    rule: allow
    port: "9090"
    proto: tcp
    src: "192.168.7.0/24"

- name: Create monitoring directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  loop:
    - /opt/monitoring
    - /opt/monitoring/prometheus

- name: Deploy prometheus config
  template:
    src: prometheus.yml.j2
    dest: /opt/monitoring/prometheus/prometheus.yml
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"

- name: Deploy docker-compose for monitoring
  template:
    src: docker-compose.yml.j2
    dest: /opt/monitoring/docker-compose.yml
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0644"

- name: Stop existing monitoring stack
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose down
    chdir: /opt/monitoring
  ignore_errors: true

- name: Start monitoring stack
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose up -d
    chdir: /opt/monitoring
