---
# app/tasks/main.yml
# This role runs on BLUE and GREEN VMs
# The app (Node.js + React) runs inside a Docker container

# Only allow traffic on frontend port from nginx (10.10.20.10)
- name: Allow frontend port from nginx only
  ufw:
    rule: allow
    port: "3000"
    proto: tcp
    src: "10.10.20.10"

# Only allow traffic on backend port from nginx (10.10.20.10)
- name: Allow backend port from nginx only
  ufw:
    rule: allow
    port: "4000"
    proto: tcp
    src: "10.10.20.10"

# Create the folder where docker-compose and .env will live
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Copy docker-compose.yml with our app settings
- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Copy .env file with database connection and other settings
# mode 0600 = only the owner can read it (keeps secrets safe)
- name: Deploy .env file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"

# Login to GitHub Container Registry to pull private images
- name: Login to GitHub Container Registry
  become_user: "{{ docker_user }}"
  command: >
    docker login ghcr.io
    -u mariusiordan
    --password-stdin
  args:
    stdin: "{{ vault_ghcr_token }}"

# Stop and remove existing containers (including orphans from previous deploys)
- name: Stop existing containers
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose down --remove-orphans
    chdir: "{{ app_dir }}"
  ignore_errors: true  # ok if nothing is running

# Clean up unused Docker images before pulling new ones
# Prevents disk space issues on long-running VMs
- name: Clean up unused Docker images
  become_user: "{{ docker_user }}"
  command: docker system prune -f
  ignore_errors: true  # ok if nothing to clean

# Start the app container
- name: Start app container
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose up -d --pull always --remove-orphans
    chdir: "{{ app_dir }}"
