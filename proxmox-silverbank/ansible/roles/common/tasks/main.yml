---
# common/tasks/main.yml
# This role runs on ALL VMs - basic setup every server needs

# Update the package list so we can install latest versions
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600  # only update if cache is older than 1 hour

# Install basic tools we need on every server
- name: Install common packages
  apt:
    name:
      - curl        # making HTTP requests
      - wget        # downloading files
      - git         # version control
      - htop        # monitoring CPU/memory
      - net-tools   # network tools like netstat
      - ufw         # firewall
    state: present  # make sure they are installed

# Firewall rule - always allow SSH so we don't lock ourselves out
- name: Allow SSH through firewall
  ufw:
    rule: allow
    port: "22"
    proto: tcp

# Enable firewall - deny everything by default, only allow what we specify
- name: Enable UFW firewall
  ufw:
    state: enabled
    policy: deny
    direction: incoming

# Set timezone to UTC - good practice for servers and logs
- name: Set timezone to UTC
  timezone:
    name: UTC

# Install node-exporter for Prometheus metrics
# Runs on all VMs - exposes system metrics on port 9100
- name: Allow node-exporter from monitoring VM only
  ufw:
    rule: allow
    port: "9100"
    proto: tcp
    src: "192.168.7.70"  # only monitoring-staging can scrape metrics

- name: Start node-exporter container
  become_user: "{{ docker_user }}"
  shell: |
    docker ps -a --filter name=node-exporter --format "{{ '{{' }}.Names{{ '}}' }}" | grep -q node-exporter || \
    docker run -d \
      --name node-exporter \
      --restart unless-stopped \
      --pid host \
      --network host \
      -v /proc:/host/proc:ro \
      -v /sys:/host/sys:ro \
      -v /:/rootfs:ro \
      prom/node-exporter:latest \
      --path.procfs=/host/proc \
      --path.sysfs=/host/sys \
      --path.rootfs=/rootfs
  ignore_errors: true

- name: Install AWS CLI
  become: true
  shell: |
    if ! /usr/local/bin/aws --version 2>/dev/null; then
      curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o /tmp/awscliv2.zip
      apt-get install -y unzip
      unzip -q /tmp/awscliv2.zip -d /tmp
      /tmp/aws/install
      rm -rf /tmp/aws /tmp/awscliv2.zip
    fi
  ignore_errors: true