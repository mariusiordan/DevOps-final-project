name: Deploy Test

on:
  workflow_dispatch:

jobs:
  read-infra:
    name: Read Terraform outputs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Read outputs from S3 state
        working-directory: aws-silverbank/terraform
        run: |
          terraform init -reconfigure
          echo "Edge IP:  $(terraform output -raw edge_elastic_ip)"
          echo "Blue IP:  $(terraform output -raw blue_private_ip)"
          echo "Green IP: $(terraform output -raw green_private_ip)"

  reach-vms:
    name: SSH to blue via edge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false
      - name: Write SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
      - name: SSH to blue via edge
        working-directory: aws-silverbank/terraform
        run: |
          terraform init -reconfigure
          EDGE=$(terraform output -raw edge_elastic_ip)
          BLUE=$(terraform output -raw blue_private_ip)
          echo "Hopping ${EDGE} -> ${BLUE}..."
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o ProxyJump=ubuntu@${EDGE} \
            ubuntu@${BLUE} "echo reached BLUE via edge as \$(whoami)"