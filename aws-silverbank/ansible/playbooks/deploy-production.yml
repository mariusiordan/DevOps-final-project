---
# playbooks/deploy-production.yml
# Updates the application on AWS DR environment
# Called automatically from GitHub Actions deploy.yml when AWS DR is active
# Also called manually when you need to update the app on AWS
#
# Flow:
#   1. Pull latest images from ghcr.io
#   2. Restart containers with new images
#   3. Wait for containers to be healthy
#   4. Verify app is responding
#
# Usage:
#   ansible-playbook playbooks/deploy-production.yml -i inventory-aws.ini
#   ansible-playbook playbooks/deploy-production.yml -i inventory-aws.ini -e "app_tag=v1.0-prod-2026-03-19-sha-abc123"

- name: Update app on AWS DR
  hosts: prod
  become: true
  vars:
    app_tag: "latest"
    app_dir: /opt/app
    docker_user: ubuntu
    frontend_image: "ghcr.io/mariusiordan/silverbank-frontend"
    backend_image:  "ghcr.io/mariusiordan/silverbank-backend"
  tasks:
    - name: Deploy updated docker-compose file
      template:
        src: ../roles/app/templates/docker-compose.yml.j2
        dest: "{{ app_dir }}/docker-compose.yml"
        owner: "{{ docker_user }}"
        group: "{{ docker_user }}"

    - name: Login to GitHub Container Registry
      become_user: "{{ docker_user }}"
      command: >
        docker login ghcr.io
        -u mariusiordan
        --password-stdin
      args:
        stdin: "{{ vault_ghcr_token }}"

    - name: Clean up unused Docker images
      become_user: "{{ docker_user }}"
      command: docker system prune -f
      ignore_errors: true

    - name: Pull latest images
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose pull
        chdir: "{{ app_dir }}"

    - name: Restart containers with new images
      become_user: "{{ docker_user }}"
      command:
        cmd: docker compose up -d --remove-orphans
        chdir: "{{ app_dir }}"

    - name: Wait for backend to be healthy
      uri:
        url: "http://localhost:4000/api/health"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 15      # max 15 attempts
      delay: 10        # every 10 seconds = 150 seconds max wait

    - name: Wait for frontend to be healthy
      uri:
        url: "http://localhost:3000"
        status_code: 200
      register: result
      until: result.status == 200
      retries: 15
      delay: 10

    - name: Confirm deployment
      debug:
        msg: "✅ App updated to {{ app_tag }} on AWS DR"
