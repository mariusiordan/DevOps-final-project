[defaults]

vault_password_file = ~/.vault-password
# Location of the inventory file (generated by Terraform)
inventory           = inventory-aws.ini

# Default user to SSH into VMs - AWS Ubuntu uses 'ubuntu', not 'devop'
remote_user         = ubuntu

# SSH private key to use
private_key_file    = ~/.ssh/id_ed25519

# Don't check SSH host keys - needed because VMs are recreated often with Terraform
host_key_checking   = False

# Don't create .retry files when a playbook fails
retry_files_enabled = False

# Tell Ansible which Python to use on the remote VMs
interpreter_python  = /usr/bin/python3.12

# Tell Ansible where to find roles (relative to ansible.cfg location)
roles_path          = ./roles

[ssh_connection]
# Send multiple commands over one SSH connection - makes playbooks faster
pipelining = True