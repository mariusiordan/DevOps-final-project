---
# postgres/tasks/main.yml
# This role runs on the db VM only (192.168.7.60)
# PostgreSQL runs inside a Docker container
# Data is stored on the VM at /opt/postgres/data so it survives container restarts

# On AWS, Security Groups handle network isolation between VMs
# UFW allows PostgreSQL from the entire private subnet (10.0.2.0/24)
- name: Allow PostgreSQL from private subnet
  ufw:
    rule: allow
    port: "{{ postgres_port }}"
    proto: tcp
    src: "10.0.2.0/24"  # AWS private subnet - only prod VM can reach DB

# Create the folders needed for postgres
- name: Create postgres directories
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0755"
  loop:
    - /opt/postgres          # docker-compose.yml lives here
    - "{{ postgres_data_dir }}"  # actual database files live here

# Copy the docker-compose file with our postgres settings
- name: Deploy docker-compose for PostgreSQL
  template:
    src: docker-compose.yml.j2
    dest: /opt/postgres/docker-compose.yml
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Start postgres container using docker compose
- name: Start PostgreSQL container
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose up -d
    chdir: /opt/postgres  # run this command from the /opt/postgres folder
# ── Backup script ────────────────────────────────────────────
# Deploy the S3 backup script to /opt on the db VM
# Run it with: sudo /opt/backup-db.sh
- name: Deploy database backup script
  copy:
    src: backup-db.sh
    dest: /opt/backup-db.sh
    owner: root
    group: root
    mode: "0755"

# Deploy the S3 restore script to /opt on the db VM
# Run it with: sudo /opt/restore-db.sh
- name: Deploy database restore script
  copy:
    src: restore-db.sh
    dest: /opt/restore-db.sh
    owner: root
    group: root
    mode: "0755"
