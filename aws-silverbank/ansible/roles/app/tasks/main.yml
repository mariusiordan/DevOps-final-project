---
- name: Allow frontend port from nginx only
  ufw:
    rule: allow
    port: "3000"
    proto: tcp
    src: "{{ blue_app_ip }}"

- name: Allow backend port from nginx only
  ufw:
    rule: allow
    port: "4000"
    proto: tcp
    src: "{{ blue_app_ip }}"

- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

- name: Deploy .env file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"

- name: Login to GitHub Container Registry
  become_user: "{{ docker_user }}"
  command: >
    docker login ghcr.io
    -u mariusiordan
    --password-stdin
  args:
    stdin: "{{ vault_ghcr_token }}"

- name: Stop existing containers
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose down --remove-orphans
    chdir: "{{ app_dir }}"
  ignore_errors: true

- name: Start app containers
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose up -d --pull always --remove-orphans
    chdir: "{{ app_dir }}"