---
# app/tasks/main.yml
# Runs on BLUE and GREEN VMs
# Deploys the SilverBank app (frontend + backend) as Docker containers
# No UFW - AWS security groups handle the firewall

# Create the folder where docker-compose and .env will live
- name: Create app directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Deploy docker-compose.yml from template (with image tags and ports)
- name: Deploy docker-compose file
  template:
    src: docker-compose.yml.j2
    dest: "{{ app_dir }}/docker-compose.yml"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"

# Deploy .env with DB connection and JWT secret
# mode 0600 = only owner can read it (protects secrets)
- name: Deploy .env file
  template:
    src: .env.j2
    dest: "{{ app_dir }}/.env"
    owner: "{{ docker_user }}"
    group: "{{ docker_user }}"
    mode: "0600"

# Log in to GHCR so we can pull private images
- name: Login to GitHub Container Registry
  become_user: "{{ docker_user }}"
  command: >
    docker login ghcr.io
    -u mariusiordan
    --password-stdin
  args:
    stdin: "{{ vault_ghcr_token }}"

# Stop any running containers before redeploying
- name: Stop existing containers
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose down --remove-orphans
    chdir: "{{ app_dir }}"
  ignore_errors: true

# Pull the latest images and start the containers
- name: Start app containers
  become_user: "{{ docker_user }}"
  command:
    cmd: docker compose up -d --pull always --remove-orphans
    chdir: "{{ app_dir }}"