---
# common/tasks/main.yml
# This role runs on ALL VMs - basic setup every server needs

# Update the package list so we can install latest versions
- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600

# Install basic tools we need on every server
- name: Install common packages
  apt:
    name:
      - curl
      - wget
      - git
      - htop
      - net-tools
      - ca-certificates
      - gnupg
      - lsb-release
      - unzip
    state: present

# Set timezone to UTC
- name: Set timezone to UTC
  timezone:
    name: UTC

# ── Docker Installation ──────────────────────────────────────

# Add Docker's official GPG key
- name: Add Docker GPG key
  apt_key:
    url: https://download.docker.com/linux/ubuntu/gpg
    state: present

# Add Docker repository
- name: Add Docker repository
  apt_repository:
    repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present

# Install Docker
- name: Install Docker
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: yes

# Enable and start Docker
- name: Enable and start Docker
  systemd:
    name: docker
    enabled: yes
    state: started

# Add ubuntu user to docker group so it can run docker without sudo
- name: Add ubuntu user to docker group
  user:
    name: ubuntu
    groups: docker
    append: yes

# Reset SSH connection so docker group takes effect immediately
- name: Reset SSH connection for docker group
  meta: reset_connection
# Wait for SSH to be ready after reset
- name: Wait for connection to be ready
  wait_for_connection:
    delay: 5       # wait 5 seconds before trying
    timeout: 30    # try for maximum 30 seconds

# ── Node Exporter ────────────────────────────────────────────
# Runs on ALL VMs - exposes system metrics on port 9100
# Prometheus (on monitoring VM) scrapes these every 15s
- name: Run node-exporter container
  community.docker.docker_container:
    name: node-exporter
    image: prom/node-exporter:latest
    state: started
    restart_policy: unless-stopped
    network_mode: host        # use host network so it sees real interfaces
    pid_mode: host            # see all host processes
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.sysfs=/host/sys
      - --path.rootfs=/rootfs
  become_user: "{{ docker_user }}"
# ── AWS CLI ──────────────────────────────────────────────────
# Needed on the db VM for S3 backups (uses the attached IAM role)
# Installed on all VMs for simplicity
- name: Check if AWS CLI is installed
  command: /usr/local/bin/aws --version
  register: awscli_check
  ignore_errors: true
  changed_when: false

- name: Download AWS CLI installer
  get_url:
    url: "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
    dest: /tmp/awscliv2.zip
    mode: "0644"
  when: awscli_check.rc != 0

- name: Unzip AWS CLI installer
  unarchive:
    src: /tmp/awscliv2.zip
    dest: /tmp
    remote_src: yes
  when: awscli_check.rc != 0

- name: Install AWS CLI
  command: /tmp/aws/install
  when: awscli_check.rc != 0

- name: Clean up AWS CLI installer
  file:
    path: "{{ item }}"
    state: absent
  loop:
    - /tmp/awscliv2.zip
    - /tmp/aws
  when: awscli_check.rc != 0