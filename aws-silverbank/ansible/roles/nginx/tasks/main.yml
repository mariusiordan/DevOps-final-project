---
# nginx/tasks/main.yml
# Runs on edge-nginx VM (AWS DR environment)
# Nginx acts as a reverse proxy forwarding traffic to the single prod VM

- name: Allow HTTP through firewall
  ufw:
    rule: allow
    port: "80"
    proto: tcp

# - name: Allow HTTPS through firewall (planned - SSL not yet configured)
#   ufw:
#     rule: allow
#     port: "443"
#     proto: tcp

- name: Install Nginx
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Enable and start Nginx
  systemd:
    name: nginx
    enabled: yes
    state: started

# Static upstream config — single prod VM, no Blue/Green on DR
- name: Deploy upstream config
  template:
    src: upstream.conf.j2
    dest: /etc/nginx/conf.d/upstream.conf
  notify: reload nginx

- name: Deploy site config
  template:
    src: app.conf.j2
    dest: /etc/nginx/sites-available/app.conf
  notify: reload nginx

- name: Enable site
  file:
    src: /etc/nginx/sites-available/app.conf
    dest: /etc/nginx/sites-enabled/app.conf
    state: link
  notify: reload nginx

- name: Remove default nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx