[defaults]
# ============================================================
# Ansible configuration for SilverBank AWS
# ============================================================

# Path to the Ansible Vault password file
# Vault encrypts secrets (DB password, JWT, GHCR token)
# We'll create this file later: echo "mypassword" > ~/.vault-password-aws
vault_password_file = ~/.vault-password-aws

# Inventory file - auto-generated by Terraform after every apply
# Contains all VM IPs with bastion configuration for private subnet
inventory = inventory-aws.ini

# Default SSH user on AWS Ubuntu 24.04 AMI
# AWS uses "ubuntu" - NOT "devop" like Proxmox
remote_user = ubuntu

# SSH private key - same key used in Terraform (var.ssh_public_key)
private_key_file = ~/.ssh/id_ed25519

# Don't check SSH host keys
# Needed because terraform destroy+apply creates NEW VMs with different host keys
# Without this, Ansible would stop asking "accept this host key?" every time
host_key_checking = False

# Don't create .retry files when a playbook fails
# These files are noise in a clean repo
retry_files_enabled = False

# Python interpreter path on remote VMs
# Ubuntu 24.04 ships with python3.12 at this path
interpreter_python = /usr/bin/python3.12

# Where to find roles (relative to ansible.cfg location)
roles_path = ./roles

# Show task timing - useful to see which tasks are slow
callbacks_enabled = profile_tasks

[ssh_connection]
# Pipelining sends multiple commands over one SSH connection
# Makes playbooks significantly faster (no SSH reconnect per task)
pipelining = True

# SSH arguments:
#   ControlMaster=auto - reuse SSH connection across tasks
#   ControlPersist=60s - keep connection alive for 60s after last task
# Big speed boost when running many tasks
ssh_args = -o ControlMaster=auto -o ControlPersist=60s